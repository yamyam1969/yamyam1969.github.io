<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>3D AR Room</title>

    <script
      type="module"
      src="https://unpkg.com/@google/model-viewer@4.3.1/dist/model-viewer.min.js">
    </script>

    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            background-color: #222;
            color: white;
            font-family: sans-serif;
        }

        #container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #error-log {
            position: absolute;
            top: 150px;
            left: 16px;
            right: 16px;
            color: #ff4d4d;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 5px;
            display: none;
            z-index: 999;
        }
    </style>
</head>

<body>
<div id="container">

    <div id="error-log"></div>

    <model-viewer
      id="viewer"
      src="./model.glb"
      ios-src="./model.usdz"
      alt="3Dモデル"
      camera-controls
      auto-rotate
      ar
      ar-modes="quick-look webxr scene-viewer"
      ar-scale="auto"
      shadow-intensity="1"
    　style="width:100%; height:100%;">

        <div style="
            position:absolute;
            top:16px;
            right:16px;
            background:white;
            padding:8px;
            border-radius:8px;
            box-shadow:0 4px 6px rgba(0,0,0,0.3);
            text-align:center;
            z-index:10;
        ">
            <img
              src="./qr.png"
              alt="このページのQRコード"
              style="width:100px; height:100px; display:block;">

            <span style="font-size:10px; color:#666;">
                スマホでAR表示
            </span>
        </div>

        <button
          slot="ar-button"
          type="button"
          style="
            background-color:#007bff;
            color:white;
            border-radius:20px;
            border:none;
            position:absolute;
            bottom:24px;
            left:50%;
            transform:translateX(-50%);
            padding:12px 24px;
            font-size:16px;
            font-weight:bold;
            box-shadow:0 4px 6px rgba(0,0,0,0.3);
            cursor:pointer;
            z-index:10;
          ">
            📷 部屋に置く（AR起動）
        </button>

    </model-viewer>
</div>

<script>
    const viewer = document.getElementById("viewer");
    const errorLog = document.getElementById("error-log");

    viewer.addEventListener("error", (event) => {
        const errorType =
            event.detail && event.detail.type
                ? event.detail.type
                : "不明";

        errorLog.style.display = "block";
        errorLog.innerHTML =
            "【エラー発生】3Dファイルの読み込みに失敗しました。" +
            "<br>詳細: " + errorType;

        console.error("model-viewer error:", event);
    });

    viewer.addEventListener("load", () => {
        console.log("GLBモデルの読み込みに成功しました。");
    });
</script>
</body>
</html>
